<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>Mis Finanzas</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0a0a0a;--s:#141414;--s2:#1a1a1a;--s3:#1f1f1f;--brd:#1e1e1e;--brd2:#2a2a2a;--t:#f0f0f0;--t2:#aaa;--t3:#666;--t4:#444;--g:#00dc82;--gd:#00dc8215;--g2:#00dc8240;--r:#ff4757;--rd:#ff475715;--r2:#ff475740;--b:#3b82f6;--bd:#3b82f615;--b2:#3b82f640;--y:#fbbf24;--yd:#fbbf2415;--acc:linear-gradient(135deg,#00dc82,#3b82f6);--rad:16px;--rad2:12px;--ff:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{font-family:var(--ff);background:var(--bg);color:var(--t);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body{max-width:480px;margin:0 auto}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#333;border-radius:4px}
button{font-family:var(--ff)}input{font-family:var(--ff)}select{font-family:var(--ff)}

/* ── Landing ── */
.land{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;position:relative;overflow:hidden}
.land::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 40%,#00dc8208 0%,transparent 50%),radial-gradient(circle at 70% 60%,#3b82f608 0%,transparent 50%);animation:landBg 20s ease infinite}
@keyframes landBg{0%,100%{transform:translate(0,0)}50%{transform:translate(-3%,3%)}}
.land-logo{font-size:42px;font-weight:800;background:var(--acc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;letter-spacing:-1.5px}
.land-sub{font-size:16px;color:var(--t2);margin-bottom:40px;max-width:320px;line-height:1.5}
.land-features{display:flex;flex-direction:column;gap:12px;width:100%;max-width:340px;margin-bottom:40px;text-align:left}
.land-feat{display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--s);border:1px solid var(--brd);border-radius:var(--rad2);font-size:14px;color:var(--t2)}
.land-feat .ico{font-size:20px;flex-shrink:0}
.land-btn{padding:16px 48px;background:var(--acc);border:none;border-radius:14px;color:#000;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:12px;width:100%;max-width:340px;transition:transform .15s}
.land-btn:active{transform:scale(.97)}
.land-btn2{background:transparent;border:1.5px solid var(--brd2);color:var(--t2);border-radius:14px;padding:14px 48px;font-size:15px;font-weight:600;cursor:pointer;width:100%;max-width:340px}
.land-footer{position:absolute;bottom:20px;font-size:11px;color:var(--t4)}

/* ── Auth ── */
.auth{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.abox{width:100%;max-width:360px}
.abox .logo{font-size:28px;font-weight:800;background:var(--acc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;display:block;margin-bottom:8px}
.abox .sub{text-align:center;color:var(--t3);font-size:14px;margin-bottom:32px}
.abox .fi{margin-bottom:12px}
.abox .sv{margin-top:8px;margin-bottom:12px}
.asw{text-align:center;font-size:13px;color:var(--t3)}
.asw button{background:none;border:none;color:var(--b);cursor:pointer;font-size:13px;font-weight:600;font-family:var(--ff)}
.aerr{background:var(--rd);color:var(--r);padding:10px 16px;border-radius:10px;font-size:13px;margin-bottom:12px;text-align:center}
.aok{background:var(--gd);color:var(--g);padding:10px 16px;border-radius:10px;font-size:13px;margin-bottom:12px;text-align:center}
.aforgot{text-align:center;margin-top:8px}.aforgot button{background:none;border:none;color:var(--t3);font-size:12px;cursor:pointer;font-family:var(--ff)}

/* ── Common ── */
.hdr{padding:20px 20px 8px;display:flex;justify-content:space-between;align-items:center}
.logo2{font-size:20px;font-weight:800;background:var(--acc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-r{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--t3)}
.hdr-r button{background:none;border:none;color:var(--t3);cursor:pointer;font-size:12px;padding:4px 8px;border-radius:6px;font-family:var(--ff)}

.rb{margin:4px 16px 0;padding:10px 16px;border-radius:var(--rad2);background:var(--s);border:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between}
.rb .l{font-size:12px;color:var(--t3)}.rb .v{font-size:15px;font-weight:700;color:var(--b);font-variant-numeric:tabular-nums;margin-left:8px}
.rb .a button{background:none;border:none;color:var(--t3);cursor:pointer;padding:4px;font-size:14px}

.mn{display:flex;align-items:center;justify-content:center;gap:16px;padding:14px 20px 6px}
.mn button{background:none;border:none;color:var(--t3);cursor:pointer;padding:4px;font-size:18px}
.mn .l{font-size:15px;font-weight:600;color:#ccc;min-width:150px;text-align:center}

.cd{background:var(--s);border-radius:var(--rad);padding:18px 20px;margin:10px 16px;border:1px solid var(--brd)}
.ct{font-size:11px;font-weight:600;color:var(--t3);letter-spacing:.5px;margin-bottom:6px;text-transform:uppercase}
.ct span{color:var(--t4);text-transform:none;letter-spacing:0}

.bal{font-size:30px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-1px}
.pos{color:var(--g)}.neg{color:var(--r)}

.g2{display:flex;gap:10px;padding:0 16px;margin-bottom:0}.g2>div{flex:1}
.mc{background:var(--s);border-radius:14px;padding:14px 16px;border:1px solid var(--brd)}
.bdg{display:inline-flex;align-items:center;font-size:10px;font-weight:700;letter-spacing:.5px;padding:2px 7px;border-radius:6px}
.ba{background:var(--gd);color:var(--g);border:1px solid var(--g2)}
.bu{background:var(--bd);color:var(--b);border:1px solid var(--b2)}
.sub2{font-size:10px;color:var(--t3);margin-top:2px}.vl{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums}
.vg{color:var(--g)}.vr{color:var(--r)}

.qa{cursor:pointer;transition:border-color .2s}.qa:hover{border-color:#fff2}

/* ── Bars ── */
.bars{display:flex;align-items:flex-end;gap:3px;height:48px}
.bars .c{display:flex;flex-direction:column;align-items:center;flex:1}
.bars .b{width:100%;max-width:28px;border-radius:4px;transition:height .3s}
.bars .lb{font-size:9px;color:var(--t3);margin-top:2px}

/* ── Pie chart ── */
.pie-wrap{display:flex;align-items:center;gap:16px;margin-top:8px}
.pie-legend{display:flex;flex-direction:column;gap:4px;flex:1;min-width:0}
.pie-leg{display:flex;align-items:center;gap:6px;font-size:12px}
.pie-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pie-leg .nm{color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.pie-leg .pv{color:var(--t3);font-size:11px;font-variant-numeric:tabular-nums}

/* ── Transactions ── */
.tx{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--brd)}
.tx:last-child{border-bottom:none}.tx .lf{flex:1;min-width:0}
.tx .ct2{font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tx .ct2 .bdg{font-size:8px;padding:1px 5px}
.tx .ds{font-size:12px;color:var(--t3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx .rt{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tx .am2{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap}
.tx .rt button{background:none;border:none;color:var(--t4);cursor:pointer;padding:4px;font-size:13px}
.lnk{font-size:12px;color:var(--b);background:none;border:none;cursor:pointer;font-weight:500;font-family:var(--ff)}

/* ── Filters bar ── */
.filters{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}
.fbtn{padding:6px 14px;border-radius:20px;border:1px solid var(--brd2);background:transparent;color:var(--t3);font-size:12px;cursor:pointer;white-space:nowrap;font-family:var(--ff)}
.fbtn.on{border-color:var(--b);background:var(--bd);color:var(--b)}

/* ── Budget bar ── */
.budget-bar{margin-top:8px}
.budget-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px}
.budget-row .nm{color:var(--t2);width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.budget-track{flex:1;height:8px;background:var(--s2);border-radius:4px;overflow:hidden;position:relative}
.budget-fill{height:100%;border-radius:4px;transition:width .4s}
.budget-row .pct{color:var(--t3);font-size:11px;width:36px;text-align:right;font-variant-numeric:tabular-nums}

/* ── FAB + Nav ── */
.fab{position:fixed;bottom:80px;right:calc(50% - 210px);width:56px;height:56px;border-radius:50%;background:var(--acc);border:none;color:#000;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(0,220,130,.3);z-index:100;transition:transform .2s;font-size:24px}
.fab:active{transform:scale(.9)}
@media(max-width:480px){.fab{right:20px}}

.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg);border-top:1px solid var(--brd);display:flex;justify-content:center;gap:36px;padding:10px 0 max(18px,env(safe-area-inset-bottom));z-index:99}
.nav button{background:none;border:none;color:var(--t4);display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;font-weight:500;cursor:pointer;font-family:var(--ff)}
.nav button.on{color:var(--g)}

/* ── Form ── */
.fp{padding:12px 20px;display:flex;flex-direction:column;gap:16px}
.ft{display:flex;gap:8px}
.ft button{flex:1;padding:12px;border-radius:var(--rad2);border:none;cursor:pointer;font-weight:600;font-size:15px;font-family:var(--ff)}
.fl{font-size:11px;color:var(--t3);margin-bottom:6px;display:block;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.fi{width:100%;padding:14px 16px;background:var(--s2);border:1px solid var(--brd2);border-radius:var(--rad2);color:var(--t);font-size:16px;outline:none;font-family:var(--ff);transition:border-color .2s}
.fi:focus{border-color:var(--b)}.fi::placeholder{color:var(--t4)}
.aw{position:relative}.aw .pf{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:20px;font-weight:600}
.aw input{padding-left:60px;font-size:28px;font-weight:700;letter-spacing:-1px}
.cps{display:flex;flex-wrap:wrap;gap:8px}
.cp{padding:8px 14px;border-radius:20px;border:1.5px solid var(--brd2);background:transparent;color:var(--t3);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:var(--ff);transition:all .2s}
.cp.on{border-color:var(--b);background:var(--bd);color:var(--b)}
.cp.ong{border-color:var(--g);background:var(--gd);color:var(--g)}
.sv{width:100%;padding:16px;background:var(--acc);border:none;border-radius:14px;color:#000;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--ff)}
.sv:disabled{opacity:.5}
.eq{font-size:12px;color:var(--t3);margin-top:6px;padding-left:4px}
.check-row{display:flex;align-items:center;gap:10px;padding:8px 0}
.check-row input[type=checkbox]{width:18px;height:18px;accent-color:var(--g)}
.check-row label{font-size:13px;color:var(--t2)}

/* ── Modal ── */
.mbg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.mdl{background:var(--s2);border-radius:var(--rad);padding:24px;width:100%;max-width:320px;border:1px solid var(--brd2)}
.mdl p{font-size:15px;font-weight:500;margin-bottom:16px;text-align:center}
.mdl .bs{display:flex;gap:10px}.mdl .bs button{flex:1;padding:12px;border-radius:10px;cursor:pointer;font-weight:500;font-family:var(--ff);font-size:14px}
.bc{border:1px solid #333;background:transparent;color:var(--t2)}
.bd2{border:none;background:var(--r);color:#fff;font-weight:600}
.bp{border:none;background:var(--acc);color:#000;font-weight:600}

/* ── Toast ── */
.tst{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#222;color:var(--g);padding:10px 24px;border-radius:12px;font-size:14px;font-weight:500;z-index:300;box-shadow:0 4px 20px rgba(0,0,0,.5);animation:ti .3s;pointer-events:none}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.emp{text-align:center;color:var(--t4);padding:24px;font-size:13px}

.spin{width:24px;height:24px;border:3px solid var(--brd);border-top-color:var(--g);border-radius:50%;animation:sp .6s linear infinite;margin:0 auto}
@keyframes sp{to{transform:rotate(360deg)}}
.loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px}

.pb100{padding-bottom:100px}
</style>
</head>
<body>
<div id="app"></div>
<script>
const SUPA_URL='https://ymeatgyyskhqvmxyrmjw.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InltZWF0Z3l5c2tocXZteHlybWp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMzI3MDEsImV4cCI6MjA4ODgwODcwMX0.le4zOIpcyOGXQOJJE1gImy_L_V9VTwHrFxT2TzKLn8I';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);

const CI=['Sueldo','Freelance','Inversiones','Otros'];
const CO=['Alquiler/Expensas','Supermercado','Delivery/Comida','Transporte','Salidas','Suscripciones','Ropa','Salud','Educación','Ahorro/Inversión','Otros'];
const MO=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const PIE_COLORS=['#ff4757','#3b82f6','#00dc82','#fbbf24','#a855f7','#ec4899','#f97316','#14b8a6','#6366f1','#ef4444','#84cc16'];

let S={user:null,txns:[],xr:1080,view:'loading',month:new Date().getMonth(),year:new Date().getFullYear(),
  editId:null,form:{type:'gasto',currency:'ARS',amount:'',category:'',desc:'',date:new Date().toISOString().slice(0,10),recurring:false},
  authMode:'login',authErr:'',authOk:'',authLoading:false,
  filterCat:'all',filterCur:'all',budgets:{}};

const $=id=>document.getElementById(id);const app=$('app');let tt;
function fA(n){return new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0}).format(n)}
function fU(n){return'US$ '+new Intl.NumberFormat('en-US',{maximumFractionDigits:2,minimumFractionDigits:2}).format(n)}
function fM(n,c){return c==='USD'?fU(n):fA(n)}
function toast(m){let t=document.querySelector('.tst');if(t)t.remove();t=document.createElement('div');t.className='tst';t.textContent=m;document.body.appendChild(t);clearTimeout(tt);tt=setTimeout(()=>t.remove(),2200)}
function bdg(c,sm){return`<span class="bdg ${c==='USD'?'bu':'ba'}" style="font-size:${sm?8:10}px;padding:${sm?'1px 5px':'2px 7px'}">${c==='USD'?'USD':'ARS'}</span>`}

// ═══ AUTH ═══
async function initAuth(){
  const{data:{session}}=await sb.auth.getSession();
  if(session){S.user=session.user;await loadData();S.view='dashboard'}
  else{S.view='landing'}
  render();
  sb.auth.onAuthStateChange(async(ev,session)=>{
    if(session){S.user=session.user;await loadData();S.view='dashboard';render()}
    else{S.user=null;S.txns=[];S.view='landing';render()}
  });
}
async function doSignup(e,p){S.authLoading=true;S.authErr='';S.authOk='';render();const{error}=await sb.auth.signUp({email:e,password:p});S.authLoading=false;if(error){S.authErr=error.message;render();return}S.authOk='Revisá tu email para confirmar la cuenta (mirá spam también).';render()}
async function doLogin(e,p){S.authLoading=true;S.authErr='';render();const{error}=await sb.auth.signInWithPassword({email:e,password:p});S.authLoading=false;if(error){S.authErr=error.message==='Invalid login credentials'?'Email o contraseña incorrectos':error.message;render()}}
async function doLogout(){await sb.auth.signOut();S.user=null;S.txns=[];S.view='landing';render()}
async function doReset(e){const{error}=await sb.auth.resetPasswordForEmail(e);if(error){S.authErr=error.message;render();return}S.authOk='Te enviamos un link para resetear tu contraseña.';render()}

// ═══ DATA ═══
async function loadData(){
  const{data}=await sb.from('transactions').select('*').eq('user_id',S.user.id).order('date',{ascending:false});
  S.txns=(data||[]).map(t=>({id:t.id,type:t.type,currency:t.currency,amount:Number(t.amount),category:t.category,description:t.description||'',date:t.date,tc:Number(t.tc_oficial)||0}));
  const{data:st}=await sb.from('user_settings').select('*').eq('user_id',S.user.id).single();
  if(st){S.xr=Number(st.exchange_rate)||1080;try{S.budgets=JSON.parse(st.budgets||'{}')}catch{S.budgets={}}}
}
async function saveTxn(txn){
  const row={user_id:S.user.id,type:txn.type,currency:txn.currency,amount:txn.amount,category:txn.category,description:txn.description,date:txn.date,tc_oficial:txn.currency==='USD'?S.xr:0};
  if(S.editId){await sb.from('transactions').update(row).eq('id',S.editId).eq('user_id',S.user.id);S.txns=S.txns.map(t=>t.id===S.editId?{...txn,id:S.editId}:t)}
  else{const{data}=await sb.from('transactions').insert(row).select().single();if(data)S.txns.unshift({...txn,id:data.id})}
}
async function delTxn(id){await sb.from('transactions').delete().eq('id',id).eq('user_id',S.user.id);S.txns=S.txns.filter(t=>t.id!==id)}
async function saveSettings(){await sb.from('user_settings').upsert({user_id:S.user.id,exchange_rate:S.xr,budgets:JSON.stringify(S.budgets),updated_at:new Date().toISOString()})}

// ═══ HELPERS ═══
function mTxns(){return S.txns.filter(t=>{const d=new Date(t.date);return d.getMonth()===S.month&&d.getFullYear()===S.year})}
function filteredTxns(list){let r=list;if(S.filterCat!=='all')r=r.filter(t=>t.category===S.filterCat);if(S.filterCur!=='all')r=r.filter(t=>t.currency===S.filterCur);return r}
function barsH(data,color){const mx=Math.max(...data.map(d=>d.v),1);return data.map(d=>`<div class="c"><div class="b" style="height:${Math.max(4,(d.v/mx)*44)}px;background:${color};opacity:${d.v===0?.2:1}"></div><span class="lb">${d.l}</span></div>`).join('')}

function pieChart(data,size){
  if(!data.length)return'';
  const total=data.reduce((s,d)=>s+d.v,0)||1;
  let cum=0;const segs=[];
  data.forEach((d,i)=>{const pct=(d.v/total)*100;const start=cum;cum+=pct;segs.push({...d,pct,start,color:PIE_COLORS[i%PIE_COLORS.length]})});
  let gradParts=segs.map(s=>`${s.color} ${s.start}% ${s.start+s.pct}%`).join(',');
  const chart=`<div style="width:${size}px;height:${size}px;border-radius:50%;background:conic-gradient(${gradParts});flex-shrink:0;position:relative"><div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:${size*.55}px;height:${size*.55}px;border-radius:50%;background:var(--s)"></div></div>`;
  const legend=segs.slice(0,7).map(s=>`<div class="pie-leg"><div class="pie-dot" style="background:${s.color}"></div><span class="nm">${s.l}</span><span class="pv">${s.pct.toFixed(0)}%</span></div>`).join('');
  return`<div class="pie-wrap">${chart}<div class="pie-legend">${legend}</div></div>`;
}

function exportCSV(){
  const hdr='Fecha,Tipo,Moneda,Monto,Categoría,Descripción\n';
  const rows=S.txns.map(t=>`${t.date},${t.type},${t.currency},${t.amount},"${t.category}","${t.description}"`).join('\n');
  const blob=new Blob([hdr+rows],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`mis-finanzas-${new Date().toISOString().slice(0,10)}.csv`;a.click();
  toast('CSV exportado ✓');
}

// ═══ RENDER ═══
function render(){
  if(S.view==='loading')return app.innerHTML=`<div class="loading"><div class="logo2">mis finanzas</div><div class="spin"></div></div>`;
  if(S.view==='landing')return renderLanding();
  if(S.view==='auth')return renderAuth();
  if(S.view==='form')return renderForm();
  if(S.view==='list')return renderList();
  if(S.view==='budgets')return renderBudgets();
  renderDash();
}

      <div class="land-feat"><span class="ico">📱</span>Funciona desde el celular y la computadora</div>

    </div>
    <button class="land-btn" onclick="S.authMode='signup';S.view='auth';S.authErr='';S.authOk='';render()">Crear cuenta gratis</button>

// ── AUTH ──
function renderAuth(){
  const isL=S.authMode==='login';
  app.innerHTML=`<div class="auth"><div class="abox">
    <div class="logo">mis finanzas</div>
    <div class="sub">${isL?'Iniciá sesión':'Creá tu cuenta gratis'}</div>
    ${S.authErr?`<div class="aerr">${S.authErr}</div>`:''}${S.authOk?`<div class="aok">${S.authOk}</div>`:''}
    <input class="fi" type="email" id="aE" placeholder="Email" autocapitalize="none" autocomplete="email">
    <input class="fi" type="password" id="aP" placeholder="Contraseña${isL?'':' (mín. 6 caracteres)'}" autocomplete="${isL?'current':'new'}-password">
    <button class="sv" id="aB" ${S.authLoading?'disabled':''}>${S.authLoading?'Cargando...':isL?'Iniciar sesión':'Crear cuenta'}</button>
    <div class="asw">${isL?'¿No tenés cuenta?':'¿Ya tenés cuenta?'} <button id="aSw">${isL?'Registrate':'Iniciá sesión'}</button></div>
    ${isL?'<div class="aforgot"><button id="aFg">¿Olvidaste tu contraseña?</button></div>':''}
    <div style="text-align:center;margin-top:16px"><button onclick="S.view='landing';render()" style="background:none;border:none;color:var(--t4);font-size:12px;cursor:pointer;font-family:var(--ff)">← Volver</button></div>
  </div></div>`;
  $('aB').onclick=()=>{const e=$('aE').value.trim(),p=$('aP').value;if(!e||!p){S.authErr='Completá email y contraseña';render();return}if(!isL&&p.length<6){S.authErr='La contraseña debe tener al menos 6 caracteres';render();return}isL?doLogin(e,p):doSignup(e,p)};
  $('aSw').onclick=()=>{S.authMode=isL?'signup':'login';S.authErr='';S.authOk='';render()};
  $('aP').onkeydown=e=>{if(e.key==='Enter')$('aB').click()};
  if(isL&&$('aFg'))$('aFg').onclick=()=>{const e=$('aE').value.trim();if(!e){S.authErr='Ingresá tu email primero';render();return}doReset(e)};
}

// ── DASHBOARD ──
function renderDash(){
  const mt=mTxns();
  const ai=mt.filter(t=>t.type==='ingreso'&&t.currency==='ARS').reduce((s,t)=>s+t.amount,0);
  const ui=mt.filter(t=>t.type==='ingreso'&&t.currency==='USD').reduce((s,t)=>s+t.amount,0);
  const ag=mt.filter(t=>t.type==='gasto'&&t.currency==='ARS').reduce((s,t)=>s+t.amount,0);
  const ug=mt.filter(t=>t.type==='gasto'&&t.currency==='USD').reduce((s,t)=>s+t.amount,0);
  const bl=(ai+ui*S.xr)-(ag+ug*S.xr);

  let l6=[];for(let i=5;i>=0;i--){let m=S.month-i,y=S.year;if(m<0){m+=12;y--}
    const ts=S.txns.filter(t=>{const d=new Date(t.date);return d.getMonth()===m&&d.getFullYear()===y});
    l6.push({l:MO[m].slice(0,3),ig:ts.filter(t=>t.type==='ingreso').reduce((s,t)=>s+(t.currency==='USD'?t.amount*S.xr:t.amount),0),
      gs:ts.filter(t=>t.type==='gasto').reduce((s,t)=>s+(t.currency==='USD'?t.amount*S.xr:t.amount),0)})}

  const ct={};mt.filter(t=>t.type==='gasto').forEach(t=>{const v=t.currency==='USD'?t.amount*S.xr:t.amount;ct[t.category]=(ct[t.category]||0)+v});
  const cs=Object.entries(ct).sort((a,b)=>b[1]-a[1]);
  const pieData=cs.map(([c,v])=>({l:c,v}));
  const rec=[...mt].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);

  // Budget check
  const budgetEntries=Object.entries(S.budgets).filter(([,v])=>v>0);
  let budgetHTML='';
  if(budgetEntries.length>0){
    budgetHTML=`<div class="cd"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div class="ct" style="margin:0">Presupuestos</div><button class="lnk" onclick="S.view='budgets';render()">Editar →</button></div><div class="budget-bar">`;
    budgetEntries.forEach(([cat,limit])=>{
      const spent=ct[cat]||0;const pct=Math.min((spent/limit)*100,100);
      const color=pct>=90?'var(--r)':pct>=70?'var(--y)':'var(--g)';
      budgetHTML+=`<div class="budget-row"><span class="nm">${cat}</span><div class="budget-track"><div class="budget-fill" style="width:${pct}%;background:${color}"></div></div><span class="pct">${pct.toFixed(0)}%</span></div>`;
    });
    budgetHTML+=`</div></div>`;
  }

  app.innerHTML=`<div class="pb100">
  <div class="hdr"><div class="logo2">mis finanzas</div><div class="hdr-r"><button onclick="exportCSV()">📥 CSV</button><button onclick="doLogout()">Salir</button></div></div>
  <div class="rb"><div style="display:flex;align-items:center;gap:8px"><span class="l">TC Oficial</span><span class="v">$${S.xr.toLocaleString('es-AR')}</span></div><div class="a"><button onclick="editRate()">⚙</button></div></div>
  <div class="mn"><button onclick="pM()">‹</button><span class="l">${MO[S.month]} ${S.year}</span><button onclick="nM()">›</button></div>
  <div class="cd"><div class="ct">Balance consolidado <span>(en ARS)</span></div><div class="bal ${bl>=0?'pos':'neg'}">${bl>=0?'+':''}${fA(bl)}</div></div>
  <div class="g2">
    <div class="mc"><div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">${bdg('ARS')}<span style="font-size:12px;color:var(--t3)">Pesos</span></div><div class="sub2">Ingresos</div><div class="vl vg">${fA(ai)}</div><div class="sub2" style="margin-top:6px">Gastos</div><div class="vl vr">${fA(ag)}</div></div>
    <div class="mc"><div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">${bdg('USD')}<span style="font-size:12px;color:var(--t3)">Dólares</span></div><div class="sub2">Ingresos</div><div class="vl vg">${fU(ui)}</div><div class="sub2" style="margin-top:6px">Gastos</div><div class="vl vr">${fU(ug)}</div></div>
  </div>
  <div class="g2">
    <div class="mc qa" onclick="oF('ingreso')" style="border-color:var(--g2)"><div style="display:flex;align-items:center;gap:8px"><span style="color:var(--g)">↑</span><span style="font-size:14px;font-weight:600;color:var(--g)">Ingreso</span></div><p style="font-size:11px;color:var(--t3);margin-top:4px">Registrar cobro</p></div>
    <div class="mc qa" onclick="oF('gasto')" style="border-color:var(--r2)"><div style="display:flex;align-items:center;gap:8px"><span style="color:var(--r)">↓</span><span style="font-size:14px;font-weight:600;color:var(--r)">Gasto</span></div><p style="font-size:11px;color:var(--t3);margin-top:4px">Registrar pago</p></div>
  </div>
  ${budgetHTML}
  <div class="cd"><div class="ct">Gastos por categoría</div>${pieData.length?pieChart(pieData,110):'<div class="emp">Sin gastos este mes</div>'}</div>
  <div class="cd"><div class="ct">Últimos 6 meses <span>(ARS)</span></div>
    <div style="margin-bottom:8px"><div style="font-size:11px;color:var(--g);margin-bottom:4px">Ingresos</div><div class="bars">${barsH(l6.map(d=>({l:d.l,v:d.ig})),'var(--g)')}</div></div>
    <div style="margin-top:12px"><div style="font-size:11px;color:var(--r);margin-bottom:4px">Gastos</div><div class="bars">${barsH(l6.map(d=>({l:d.l,v:d.gs})),'var(--r)')}</div></div></div>
  <div class="cd">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div class="ct" style="margin:0">Últimos movimientos</div><button class="lnk" onclick="gL()">Ver todos →</button></div>
    ${rec.length===0?'<div class="emp">Tocá + para agregar tu primer movimiento</div>':rec.map(t=>`<div class="tx"><div class="lf"><div class="ct2">${t.category} ${bdg(t.currency,1)}</div>${t.description&&t.description!==t.category?`<div class="ds">${t.description}</div>`:''}</div>
      <span class="am2" style="color:${t.type==='ingreso'?'var(--g)':'var(--r)'}">${t.type==='ingreso'?'+':'-'}${fM(t.amount,t.currency)}</span></div>`).join('')}
  </div>
  <div style="text-align:center;padding:4px 0 8px"><button class="lnk" onclick="S.view='budgets';render()">⚙ Presupuestos por categoría</button></div>
  </div>
  <button class="fab" onclick="oF()">+</button>
  <div class="nav"><button class="on" onclick="gD()">📊<span>Dashboard</span></button><button onclick="gL()">📋<span>Movimientos</span></button></div>`;
}

// ── LIST ──
function renderList(){
  const mt=filteredTxns([...mTxns()]).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const allCats=[...new Set(mTxns().map(t=>t.category))];
  app.innerHTML=`<div class="pb100">
  <div class="hdr"><span style="font-size:17px;font-weight:600">Movimientos</span><div class="hdr-r"><button onclick="exportCSV()">📥 CSV</button><span style="color:var(--t3)">${mt.length} items</span></div></div>
  <div class="mn"><button onclick="pM()">‹</button><span class="l">${MO[S.month]} ${S.year}</span><button onclick="nM()">›</button></div>
  <div class="filters">
    <button class="fbtn ${S.filterCat==='all'?'on':''}" onclick="S.filterCat='all';render()">Todas</button>
    ${allCats.map(c=>`<button class="fbtn ${S.filterCat===c?'on':''}" onclick="S.filterCat='${c}';render()">${c}</button>`).join('')}
    <button class="fbtn ${S.filterCur==='ARS'?'on':''}" onclick="S.filterCur=S.filterCur==='ARS'?'all':'ARS';render()">ARS</button>
    <button class="fbtn ${S.filterCur==='USD'?'on':''}" onclick="S.filterCur=S.filterCur==='USD'?'all':'USD';render()">USD</button>
  </div>
  <div style="padding:4px 20px">
    ${mt.length===0?'<div class="emp" style="padding:32px">No hay movimientos con estos filtros</div>':mt.map(t=>`<div class="tx"><div class="lf"><div class="ct2">${t.category} ${bdg(t.currency,1)}</div>
      <div class="ds">${t.description&&t.description!==t.category?t.description+' · ':''}${new Date(t.date+'T12:00:00').toLocaleDateString('es-AR',{day:'numeric',month:'short'})}</div></div>
      <div class="rt"><span class="am2" style="color:${t.type==='ingreso'?'var(--g)':'var(--r)'}">${t.type==='ingreso'?'+':'-'}${fM(t.amount,t.currency)}</span>
      <button onclick="eT('${t.id}')">✎</button><button onclick="cD('${t.id}')">🗑</button></div></div>`).join('')}
  </div></div>
  <button class="fab" onclick="oF()">+</button>
  <div class="nav"><button onclick="gD()">📊<span>Dashboard</span></button><button class="on" onclick="gL()">📋<span>Movimientos</span></button></div>`;
}

// ── BUDGETS ──
function renderBudgets(){
  app.innerHTML=`<div class="pb100">
  <div class="hdr"><span style="font-size:17px;font-weight:600">Presupuestos mensuales</span>
    <button onclick="gD()" style="background:none;border:none;color:var(--t3);cursor:pointer;font-size:20px">✕</button></div>
  <p style="padding:0 20px;font-size:13px;color:var(--t3);margin-bottom:16px">Definí un límite mensual en ARS para cada categoría de gasto. Dejá en 0 las que no querés controlar.</p>
  <div style="padding:0 20px;display:flex;flex-direction:column;gap:12px">
    ${CO.map(c=>`<div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:13px;color:var(--t2);width:130px;flex-shrink:0">${c}</span>
      <input type="number" inputmode="numeric" class="fi" style="padding:10px 12px;font-size:14px" placeholder="0" value="${S.budgets[c]||''}" onchange="S.budgets['${c}']=parseInt(this.value)||0">
    </div>`).join('')}
    <button class="sv" onclick="saveBudgets()" style="margin-top:8px">Guardar presupuestos</button>
  </div></div>`;
}
async function saveBudgets(){await saveSettings();toast('Presupuestos guardados ✓');gD()}

// ── FORM ──
function renderForm(){
  const f=S.form,cats=f.type==='ingreso'?CI:CO,ac=f.type==='ingreso'?'ong':'on';
  app.innerHTML=`<div class="pb100">
  <div class="hdr"><span style="font-size:17px;font-weight:600">${S.editId?'Editar':'Nuevo'} movimiento</span>
    <button onclick="cF()" style="background:none;border:none;color:var(--t3);cursor:pointer;font-size:20px">✕</button></div>
  <div class="fp">
    <div class="ft"><button onclick="sT('gasto')" style="background:${f.type==='gasto'?'var(--rd)':'var(--s2)'};color:${f.type==='gasto'?'var(--r)':'var(--t3)'}">Gasto</button>
      <button onclick="sT('ingreso')" style="background:${f.type==='ingreso'?'var(--gd)':'var(--s2)'};color:${f.type==='ingreso'?'var(--g)':'var(--t3)'}">Ingreso</button></div>
    <div><label class="fl">Moneda</label><div class="ft">
      <button onclick="sC('ARS')" style="border:1.5px solid ${f.currency==='ARS'?'var(--g)':'var(--brd2)'};background:${f.currency==='ARS'?'var(--gd)':'var(--s2)'};color:${f.currency==='ARS'?'var(--g)':'var(--t3)'}">$ ARS</button>
      <button onclick="sC('USD')" style="border:1.5px solid ${f.currency==='USD'?'var(--b)':'var(--brd2)'};background:${f.currency==='USD'?'var(--bd)':'var(--s2)'};color:${f.currency==='USD'?'var(--b)':'var(--t3)'}">US$ USD</button></div></div>
    <div><label class="fl">Monto</label><div class="aw"><span class="pf" style="color:${f.currency==='USD'?'var(--b)':'var(--g)'}">${f.currency==='USD'?'US$':'$'}</span>
      <input type="number" inputmode="decimal" class="fi" placeholder="0" value="${f.amount}" oninput="S.form.amount=this.value;uEq()" id="amt"></div><div class="eq" id="eq"></div></div>
    <div><label class="fl">Categoría</label><div class="cps">${cats.map(c=>`<button class="cp ${f.category===c?ac:''}" onclick="sCat('${c}')">${c}</button>`).join('')}</div></div>
    <div><label class="fl">Fecha</label><input type="date" class="fi" value="${f.date}" onchange="S.form.date=this.value" style="color-scheme:dark"></div>
    <div><label class="fl">Descripción <span style="color:var(--t4)">(opcional)</span></label><input type="text" class="fi" placeholder="Ej: Netflix, cena..." value="${f.desc}" oninput="S.form.desc=this.value"></div>
    ${!S.editId?`<div class="check-row"><input type="checkbox" id="recChk" ${f.recurring?'checked':''} onchange="S.form.recurring=this.checked"><label for="recChk">Repetir todos los meses (gasto recurrente)</label></div>`:''}
    <button class="sv" onclick="hS()" id="saveBtn">${S.editId?'Guardar cambios':'Registrar'}</button>
  </div></div>`;
  uEq();setTimeout(()=>{const e=$('amt');if(e&&!S.editId)e.focus()},200);
}
function uEq(){const e=$('eq');if(!e)return;e.textContent=S.form.currency==='USD'&&S.form.amount?'≈ '+fA(parseFloat(S.form.amount)*S.xr)+' al TC oficial':''}

// ═══ ACTIONS ═══
function gD(){S.view='dashboard';S.filterCat='all';S.filterCur='all';render()}
function gL(){S.view='list';render()}
function pM(){if(S.month===0){S.month=11;S.year--}else S.month--;render()}
function nM(){if(S.month===11){S.month=0;S.year++}else S.month++;render()}
function oF(type){S.editId=null;S.form={type:type||'gasto',currency:'ARS',amount:'',category:'',desc:'',date:new Date().toISOString().slice(0,10),recurring:false};S.view='form';render()}
function cF(){S.editId=null;S.view='dashboard';render()}
function sT(t){S.form.type=t;S.form.category='';render()}
function sC(c){S.form.currency=c;render()}
function sCat(c){S.form.category=c;render()}

async function hS(){
  const amt=parseFloat(S.form.amount);
  if(!amt||amt<=0){toast('Ingresá un monto válido');return}
  if(!S.form.category){toast('Elegí una categoría');return}
  const btn=$('saveBtn');if(btn){btn.disabled=true;btn.textContent='Guardando...'}
  const txn={type:S.form.type,currency:S.form.currency,amount:amt,category:S.form.category,description:S.form.desc,date:S.form.date};
  if(S.form.recurring&&!S.editId){
    // Create for current month and next 11 months
    for(let i=0;i<12;i++){
      const d=new Date(S.form.date);d.setMonth(d.getMonth()+i);
      const dateStr=d.toISOString().slice(0,10);
      await saveTxn({...txn,date:dateStr});
    }
    toast('12 meses recurrentes creados ✓');
  } else {
    await saveTxn(txn);
    toast(S.editId?'Editado ✓':S.form.type==='ingreso'?'Ingreso guardado ✓':'Gasto guardado ✓');
  }
  S.editId=null;S.view='dashboard';render();
}

function eT(id){const t=S.txns.find(x=>x.id===id);if(!t)return;S.editId=t.id;S.form={type:t.type,currency:t.currency,amount:t.amount.toString(),category:t.category,desc:t.description||'',date:t.date,recurring:false};S.view='form';render()}

function cD(id){
  const bg=document.createElement('div');bg.className='mbg';bg.onclick=()=>bg.remove();
  bg.innerHTML=`<div class="mdl" onclick="event.stopPropagation()"><p>¿Eliminar este movimiento?</p><div class="bs">
    <button class="bc" onclick="this.closest('.mbg').remove()">Cancelar</button>
    <button class="bd2" onclick="dT('${id}');this.closest('.mbg').remove()">Eliminar</button></div></div>`;
  document.body.appendChild(bg);
}
async function dT(id){await delTxn(id);toast('Eliminado ✓');render()}

function editRate(){
  const bg=document.createElement('div');bg.className='mbg';bg.onclick=()=>bg.remove();
  bg.innerHTML=`<div class="mdl" onclick="event.stopPropagation()"><p style="font-weight:600;margin-bottom:4px">Tipo de cambio</p>
    <p style="font-size:12px;color:var(--t3);margin-bottom:16px">Ingresá el dólar oficial</p>
    <input type="number" inputmode="decimal" class="fi" value="${S.xr}" id="ri" style="font-size:22px;font-weight:700;text-align:center;margin-bottom:16px">
    <div class="bs"><button class="bc" onclick="this.closest('.mbg').remove()">Cancelar</button>
    <button class="bp" onclick="sR()">Guardar</button></div></div>`;
  document.body.appendChild(bg);
}
async function sR(){const v=parseFloat($('ri').value);if(v>0){S.xr=v;await saveSettings();toast('TC: $'+v.toLocaleString('es-AR'))}document.querySelector('.mbg').remove();render()}

// ═══ INIT ═══
initAuth();
</script>
</body>
</html>
